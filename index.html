/* ── Lane assignment ── */
function assignLanes(bks) {
  const sorted = [...bks].sort((a, b) => a.s - b.s);
  const ends = [];
  const res = sorted.map(b => {
    let lane = ends.findIndex(e => e <= b.s);
    if (lane === -1) lane = ends.length;
    ends[lane] = b.s + b.dn;
    return {
      ...b,
      lane
    };
  });
  return {
    list: res,
    lanes: Math.max(1, ends.length)
  };
}

/* ── AL/DO auto-extend ── */
function adjustSpan(b, leaveDays) {
  if (b.isLeave) return b.n;
  let wd = 0,
    d = b.s;
  while (wd < b.n) {
    if (!leaveDays.has(d)) wd++;
    if (wd < b.n) d++;
  }
  return d - b.s + 1;
}

/* ── Process team ── */
function processTeam(bks, team) {
  return team.map(m => {
    const mb = bks.filter(b => b.p === m.id);
    const leaveDays = new Set(mb.filter(b => b.isLeave).flatMap(b => Array.from({
      length: b.n
    }, (_, i) => b.s + i)));
    const adj = mb.map(b => ({
      ...b,
      dn: adjustSpan(b, leaveDays)
    }));
    const {
      list,
      lanes
    } = assignLanes(adj);
    const rowH = Math.max(52, lanes * LANE_H + ROW_PAD);
    return {
      ...m,
      bks: list,
      lanes,
      rowH
    };
  });
}
