/* ── Build weekday-only timeline ── */
const CAL_RANGE_START = -10,
  CAL_RANGE_END = 110; // calendar offset range to cover
const _allDays = [];
for (let i = CAL_RANGE_START; i < CAL_RANGE_END; i++) {
  const d = new Date(WIN);
  d.setDate(d.getDate() + i);

    d
  });

const _wdayEntries = _allDays.filter(x => x.d.getDay() !== 0 && x.d.getDay() !== 6);
const DAYS = _wdayEntries.map(x => x.d);
const NUM_DAYS = DAYS.length;
/* Calendar offset → visual column index */
const _calToVis = {};
_wdayEntries.forEach((x, vi) => {
  _calToVis[x.off] = vi;
});
/* For weekend offsets, snap to next Monday's visual index */
_allDays.forEach(x => {
  if (_calToVis[x.off] === undefined) {
    let next = x.off + 1;
    while (_calToVis[next] === undefined && next < CAL_RANGE_END) next++;
    _calToVis[x.off] = _calToVis[next] !== undefined ? _calToVis[next] : NUM_DAYS;
  }
});
/* Visual column → calendar offset (reverse) */
const _visToCal = _wdayEntries.map(x => x.off);
function calToVis(calOff) {
  return _calToVis[calOff] ?? 0;
}
function visToCal(visIdx) {
  return _visToCal[Math.max(0, Math.min(visIdx, _visToCal.length - 1))] ?? 0;
}
/* Visual width of a booking: how many weekday columns it spans */
function visSpan(calStart, calDays) {
  const vs = calToVis(calStart);
  const ve = calToVis(calStart + calDays - 1);
  return Math.max(1, ve - vs + 1);
}

  let c = 0,
    d = new Date(s);
  while (d <= e) {
    if (d.getDay() !== 0 && d.getDay() !== 6) c++;
    d = addD(d, 1);

};

  const r = parseInt(hex.slice(1, 3), 16),
    g = parseInt(hex.slice(3, 5), 16),
    b = parseInt(hex.slice(5, 7), 16);

async function saveBookingsToGH(bookings) {
  // Save-guard: abort if entry count drops by more than 20% (prevents partial-state overwrites)
  if (_ghLastCount !== null && bookings.length < _ghLastCount * 0.8) {
    console.error(`[GH] Save ABORTED — count dropped from ${_ghLastCount} to ${bookings.length} (possible partial state). Reload the page to fix.`);

    const api = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;

      'Authorization': `token ${GH_TOKEN}`,
      'Accept': 'application/vnd.github+json'

      message: 'Apollo: update tasks.json',

          sowUrl: b.sowUrl

    if (_ghSha) payload.sha = _ghSha;
    const r2 = await fetch(api, {
      method: 'PUT',
      headers: {
        ...hdrs,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)

function assignLanes(bks) {
  const sorted = [...bks].sort((a, b) => a.s - b.s);

    let lane = ends.findIndex(e => e <= b.s);

      lane

    list: res,

  };

}

/* Deal name → proj code (fuzzy match for task projects) */
function projCodeFromName(name) {

  const n = name.toLowerCase();
  if (n.includes('eckersley')) return 'eurd';
  if (n.includes('jag') || n.includes('apg')) return 'jewd';
  if (n.includes('bywren') || n.includes('wren')) return 'bsp';
  if (n.includes('early settler')) return 'essw';
  if (n.includes('landsmith')) return 'lswb';
  if (n.includes('jardan')) return 'jdb';
  if (n.includes('kidman')) return 'kgtr';
  if (n.includes('cable') && n.includes('migrat')) return 'cwm';
  if (n.includes('cable') && n.includes('melb')) return 'cmsp';
  if (n.includes('rip curl') || n.includes('ripcurl')) return 'rcsp';
  if (n.includes('decjuba')) return 'dspd';
  if (n.includes('jac') && n.includes('jack')) return 'jjsp';
  if (n.includes('manning')) return 'mcsp';
  if (n.includes('essity')) return 'esqq';
  if (n.includes('billini') || n.includes('banbe')) return 'bbsp';
  if (n.includes('perri')) return 'pcsp';
  if (n.includes('natural pet')) return 'npfg';
  if (n.includes('shakti')) return 'shak';
  if (n.includes('svdp') || n.includes('vincent')) return 'svdp';
  if (n.includes('frank green')) return 'fgsp';
  if (n.includes('lindelli')) return 'lisp';
  if (n.includes('space furniture')) return 'sfsp';
  if (n.includes('seed')) return 'g';
  if (n.includes('castle')) return 'g';
  if (n.includes('living edge')) return 'g';
  return 'g';
}

/* Fetch tasks + leave from tasks.json (generated server-side from Productive) */

  try {

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const entries = (data.entries || []).map((e, i) => ({
      ...e,
      id: String(10000 + i),
      sowUrl: e.sowUrl || null,
      prodUrl: e.prodUrl || null,
      prodBookingId: e.prodBookingId || null,
      title: e.title || e.note || '',
      description: e.description || '',
      tags: e.tags || [],
      taskList: e.taskList || '',
      priority: e.priority || '',
      status: e.status || '',
      dueDate: e.dueDate || '',
      attachments: e.attachments || []
    }));
    console.log(`[Fetch] Loaded ${entries.length} entries from tasks.json (generated ${data.generated || '?'})`);
    return entries;
  } catch (err) {
    console.error('[Fetch] Failed to load tasks.json:', err);

/* Helper: sum booked hours for a person in a date range (calendar offsets) */
function personHoursInRange(bookings, pid, rangeStart, rangeEnd) {
  let total = 0;
  bookings.forEach(bk => {
    if (bk.p !== pid || bk.isLeave) return;
    const bkEnd = bk.s + (bk.dn || 1) - 1;
    if (bkEnd < rangeStart || bk.s > rangeEnd) return;
    const bkWd = workDaysBetween(new Date(WIN.getTime() + bk.s*86400000), new Date(WIN.getTime() + bkEnd*86400000));
    if (bkWd === 0) return;
    const hpd = (bk.hrs || 0) / bkWd;
    const oStart = Math.max(bk.s, rangeStart);
    const oEnd   = Math.min(bkEnd, rangeEnd);
    const oWd    = workDaysBetween(new Date(WIN.getTime() + oStart*86400000), new Date(WIN.getTime() + oEnd*86400000));
    total += hpd * oWd;
  });
  return Math.round(total * 10) / 10;
}
