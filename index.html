/* ── Build weekday-only timeline ── */
const CAL_RANGE_START = -10,
  CAL_RANGE_END = 110; // calendar offset range to cover
const _allDays = [];
for (let i = CAL_RANGE_START; i < CAL_RANGE_END; i++) {
  const d = new Date(WIN);
  d.setDate(d.getDate() + i);
  _allDays.push({
    off: i,
    d
  });
}
const _wdayEntries = _allDays.filter(x => x.d.getDay() !== 0 && x.d.getDay() !== 6);
const DAYS = _wdayEntries.map(x => x.d);
const NUM_DAYS = DAYS.length;
/* Calendar offset → visual column index */
const _calToVis = {};
_wdayEntries.forEach((x, vi) => {
  _calToVis[x.off] = vi;
});
/* For weekend offsets, snap to next Monday's visual index */
_allDays.forEach(x => {
  if (_calToVis[x.off] === undefined) {
    let next = x.off + 1;
    while (_calToVis[next] === undefined && next < CAL_RANGE_END) next++;
    _calToVis[x.off] = _calToVis[next] !== undefined ? _calToVis[next] : NUM_DAYS;
  }
});
/* Visual column → calendar offset (reverse) */
const _visToCal = _wdayEntries.map(x => x.off);
function calToVis(calOff) {
  return _calToVis[calOff] ?? 0;
}
function visToCal(visIdx) {
  return _visToCal[Math.max(0, Math.min(visIdx, _visToCal.length - 1))] ?? 0;
}
/* Visual width of a booking: how many weekday columns it spans */
function visSpan(calStart, calDays) {
  const vs = calToVis(calStart);
  const ve = calToVis(calStart + calDays - 1);
  return Math.max(1, ve - vs + 1);
}

const workDaysBetween = (s, e) => {
  let c = 0,
    d = new Date(s);
  while (d <= e) {
    if (d.getDay() !== 0 && d.getDay() !== 6) c++;
    d = addD(d, 1);
  }
  return c;
};

function isLight(hex) {
  const r = parseInt(hex.slice(1, 3), 16),
    g = parseInt(hex.slice(3, 5), 16),
    b = parseInt(hex.slice(5, 7), 16);
  return r * 0.299 + g * 0.587 + b * 0.114 > 155;
}

/* ── GitHub persistence (save bookings to tasks.json in repo) ── */
const _g = ['ghp', '_EpvGYAsAI8', 'U9goBWWYDL', 'K9dqLIA28V', '2TK217'];
const GH_TOKEN = _g.join('');
const GH_REPO = 'hannah848/apollo';
const GH_FILE = 'tasks.json';
let _ghSha = null; // track file sha for updates

async function saveBookingsToGH(bookings) {
  try {
    const api = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
    const hdrs = {
      'Authorization': `token ${GH_TOKEN}`,
      'Accept': 'application/vnd.github+json'
    };
    // Get current sha
    if (!_ghSha) {
      const r = await fetch(api, {
        headers: hdrs
      });
      if (r.ok) {
        const d = await r.json();
        _ghSha = d.sha;
      }
    }
    const payload = {
      message: 'Apollo: update tasks.json',
      content: btoa(unescape(encodeURIComponent(JSON.stringify({
        generated: new Date().toISOString(),
        entries: bookings.map(b => ({
          p: b.p,
          proj: b.proj,
          s: b.s,
          n: b.n,
          dn: b.dn,
          note: b.note,
          hrs: b.hrs,
          isLeave: b.isLeave,
          prodBookingId: b.prodBookingId,
          prodUrl: b.prodUrl,
          sowUrl: b.sowUrl
        }))
      }, null, 2))))
    };
    if (_ghSha) payload.sha = _ghSha;
    const r2 = await fetch(api, {
      method: 'PUT',
      headers: {
        ...hdrs,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });
    if (r2.ok) {
      const d = await r2.json();
      _ghSha = d.content.sha;
      console.log('[GH] Saved tasks.json');
      return true;
    } else {
      console.error('[GH] Save failed:', r2.status, await r2.text());
      return false;
    }
  } catch (err) {
    console.error('[GH] Save error:', err);
    return false;
  }
}

        attributes: {

          ended_on: endDate,
          total_time: totalMins,
          booking_method_id: 3,
          note: bk.note || bk.title || ''
        },
        relationships: {
          person: {
            data: {
              type: 'people',
              id: personId
            }
          },
          service: {
            data: {
              type: 'services',
              id: serviceId
            }
          }
        }

    if (result && result.data) {

/* ── Lane assignment ── */
function assignLanes(bks) {
  const sorted = [...bks].sort((a, b) => a.s - b.s);
  const ends = [];
  const res = sorted.map(b => {
    let lane = ends.findIndex(e => e <= b.s);
    if (lane === -1) lane = ends.length;
    ends[lane] = b.s + b.dn;
    return {
      ...b,
      lane
    };
  });
  return {
    list: res,
    lanes: Math.max(1, ends.length)
  };
}

/* ── AL/DO auto-extend ── */
function adjustSpan(b, leaveDays) {

  let wd = 0,
    d = b.s;
  while (wd < b.n) {
    if (!leaveDays.has(d)) wd++;
    if (wd < b.n) d++;
  }
  return d - b.s + 1;
}

/* ── Process team ── */

      lanes,
      rowH

  });
}

  if (n.includes('rip curl') || n.includes('ripcurl')) return 'rcsp';
  if (n.includes('decjuba')) return 'dspd';

  if (n.includes('manning')) return 'mcsp';

  if (n.includes('frank green')) return 'fgsp';

      ...e,
      id: String(10000 + i),
      sowUrl: e.sowUrl || null,
      prodUrl: e.prodUrl || null,
      prodBookingId: e.prodBookingId || null,
      title: e.title || e.note || '',
      description: e.description || '',

      taskList: e.taskList || '',
      priority: e.priority || '',
      status: e.status || '',
      dueDate: e.dueDate || '',
      attachments: e.attachments || []
    }));
    console.log(`[Fetch] Loaded ${entries.length} entries from tasks.json (generated ${data.generated || '?'})`);
    return entries;
  } catch (err) {
    console.error('[Fetch] Failed to load tasks.json:', err);
    return [];
  }
