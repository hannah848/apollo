name: Sync Queue
on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:
  push:
    paths:
      - '.github/scripts/sync_queue.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch Hannah queue from Productive
        run: python3 .github/scripts/sync_queue.py
        env:
          PRODUCTIVE_TOKEN: ${{ secrets.PRODUCTIVE_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "apollo-bot"
          git config user.email "bot@dotcollective.com.au"
          git add queue-data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "sync: queue $(date -u +%H:%M)"
          git pull --rebase origin main
          git push
