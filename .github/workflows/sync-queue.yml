name: Sync Queue
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Hannah queue from Productive
        env:
          PRODUCTIVE_TOKEN: ${{ secrets.PRODUCTIVE_TOKEN }}
        run: |
          curl -sf \
            -H "X-Auth-Token: $PRODUCTIVE_TOKEN" \
            -H "X-Organization-Id: 1476" \
            "https://api.productive.io/api/v2/tasks?filter%5Bassignee_id%5D=777282&filter%5Bstatus%5D=1&filter%5Bafter%5D=2025-10-01&include=deal%2Cservice&page%5Bsize%5D=100" \
            | python3 -c "
import sys, json, datetime
data = json.load(sys.stdin)
data['_generated'] = datetime.datetime.utcnow().isoformat() + 'Z'
print(json.dumps(data, indent=2))
" > queue-data.json
          echo "Fetched $(python3 -c "import json; d=json.load(open('queue-data.json')); print(len(d.get('data',[])))" ) tickets"

      - name: Commit if changed
        run: |
          git config user.name "apollo-bot"
          git config user.email "bot@dotcollective.com.au"
          git add queue-data.json
          git diff --staged --quiet || git commit -m "sync: queue $(date -u +%H:%M)"
          git push
