name: Sync Apollo → Productive
on:
  push:
    paths:
      - tasks.json
    branches:
      - main

jobs:
  sync:
    # Skip if this is our own bot commit (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'sync:')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD^ to compare changes

      - name: Sync bookings to Productive
        env:
          PRODUCTIVE_TOKEN: ${{ secrets.PRODUCTIVE_TOKEN }}
        run: python3 .github/scripts/sync_to_productive.py

      - name: Commit prodBookingIds back to tasks.json
        run: |
          git config user.name "apollo-bot"
          git config user.email "bot@dotcollective.com.au"
          git add tasks.json
          git diff --staged --quiet || git commit -m "sync: write prodBookingIds back to tasks.json"
          git push
