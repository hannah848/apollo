name: Sync Apollo → Productive
on:
  push:
    paths:
      - tasks.json
  workflow_dispatch:   # Also available to run manually from Actions tab

jobs:
  sync:
    # Only run if the commit message starts with "Apollo:" (written by the scheduler)
    # This prevents loops when the bot commits prodBookingIds back to tasks.json
    if: startsWith(github.event.head_commit.message, 'Apollo:') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync bookings to Productive
        env:
          PRODUCTIVE_TOKEN: ${{ secrets.PRODUCTIVE_TOKEN }}
        run: python3 .github/scripts/sync_to_productive.py

      - name: Commit prodBookingIds back to tasks.json
        run: |
          git config user.name "apollo-bot"
          git config user.email "bot@dotcollective.com.au"
          git add tasks.json
          git diff --staged --quiet || git commit -m "sync: write prodBookingIds back to tasks.json"
          git push
