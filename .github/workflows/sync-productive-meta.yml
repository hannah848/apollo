name: Sync Productive Meta
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch projects and task lists from Productive
        run: python3 .github/scripts/sync_productive_meta.py
        env:
          PRODUCTIVE_TOKEN: ${{ secrets.PRODUCTIVE_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "apollo-bot"
          git config user.email "bot@dotcollective.com.au"
          git add productive-meta.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "sync: productive-meta $(date -u +%H:%M)"
          git pull --rebase origin main
          git push
